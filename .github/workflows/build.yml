name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows'
        type: boolean
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS'
        type: boolean
        default: true

env:
  FLUTTER_VERSION: '3.27.4'

jobs:
  # ============================================================
  # Android APK (signed release)
  # ============================================================
  build-android:
    if: ${{ github.event_name == 'push' || inputs.build_android }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/keystore.jks
          echo "$KEY_PROPERTIES" > android/key.properties

      - name: Build APK
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          OSS_URL: ${{ secrets.OSS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_VERIFY_KEY: ${{ secrets.EMAIL_VERIFY_KEY }}
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=API_DOMAIN="$API_DOMAIN" \
            --dart-define=OSS_URL="$OSS_URL" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            --dart-define=EMAIL_VERIFY_KEY="$EMAIL_VERIFY_KEY"

      - name: Build App Bundle
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          OSS_URL: ${{ secrets.OSS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_VERIFY_KEY: ${{ secrets.EMAIL_VERIFY_KEY }}
        run: |
          flutter build appbundle --release \
            --dart-define=API_DOMAIN="$API_DOMAIN" \
            --dart-define=OSS_URL="$OSS_URL" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            --dart-define=EMAIL_VERIFY_KEY="$EMAIL_VERIFY_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ============================================================
  # Windows (exe + Inno Setup installer)
  # ============================================================
  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build Windows
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          OSS_URL: ${{ secrets.OSS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_VERIFY_KEY: ${{ secrets.EMAIL_VERIFY_KEY }}
        run: |
          flutter build windows --release `
            --dart-define=API_DOMAIN="$env:API_DOMAIN" `
            --dart-define=OSS_URL="$env:OSS_URL" `
            --dart-define=ENCRYPTION_KEY="$env:ENCRYPTION_KEY" `
            --dart-define=EMAIL_VERIFY_KEY="$env:EMAIL_VERIFY_KEY"

      - name: Copy xray binaries to build output
        shell: pwsh
        run: |
          $binDir = "build\windows\x64\runner\Release\bin"
          New-Item -ItemType Directory -Force -Path $binDir
          Copy-Item "assets\bin\windows\xray.exe" -Destination $binDir
          Copy-Item "assets\bin\windows\sing-box.exe" -Destination $binDir
          Copy-Item "assets\bin\windows\wintun.dll" -Destination $binDir
          Copy-Item "assets\bin\geoip.dat" -Destination $binDir
          Copy-Item "assets\bin\geosite.dat" -Destination $binDir

      - name: Build Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.5
        with:
          path: windows/flux_setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/x64/runner/Output/*.exe

      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: build/windows/x64/runner/Release/

  # ============================================================
  # Linux (tar.gz bundle)
  # ============================================================
  build-linux:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          OSS_URL: ${{ secrets.OSS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_VERIFY_KEY: ${{ secrets.EMAIL_VERIFY_KEY }}
        run: |
          flutter build linux --release \
            --dart-define=API_DOMAIN="$API_DOMAIN" \
            --dart-define=OSS_URL="$OSS_URL" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            --dart-define=EMAIL_VERIFY_KEY="$EMAIL_VERIFY_KEY"

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release/bundle
          mkdir -p bin
          cp "$GITHUB_WORKSPACE/assets/bin/linux/xray" bin/
          cp "$GITHUB_WORKSPACE/assets/bin/linux/sing-box" bin/
          cp "$GITHUB_WORKSPACE/assets/bin/geoip.dat" bin/
          cp "$GITHUB_WORKSPACE/assets/bin/geosite.dat" bin/
          chmod +x bin/xray bin/sing-box
          cd "$GITHUB_WORKSPACE"
          tar -czf flux-linux-x64.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: flux-linux-x64.tar.gz

  # ============================================================
  # macOS (app bundle zip)
  # ============================================================
  build-macos:
    if: ${{ github.event_name == 'push' || inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Build macOS
        env:
          API_DOMAIN: ${{ secrets.API_DOMAIN }}
          OSS_URL: ${{ secrets.OSS_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          EMAIL_VERIFY_KEY: ${{ secrets.EMAIL_VERIFY_KEY }}
        run: |
          flutter build macos --release \
            --dart-define=API_DOMAIN="$API_DOMAIN" \
            --dart-define=OSS_URL="$OSS_URL" \
            --dart-define=ENCRYPTION_KEY="$ENCRYPTION_KEY" \
            --dart-define=EMAIL_VERIFY_KEY="$EMAIL_VERIFY_KEY"

      - name: Copy xray binaries to app bundle
        run: |
          APP_BUNDLE="build/macos/Build/Products/Release/flux.app"
          XRAY_DIR="$APP_BUNDLE/Contents/Resources/xray-bin"
          mkdir -p "$XRAY_DIR"
          cp assets/bin/macos/xray "$XRAY_DIR/"
          cp assets/bin/macos/sing-box "$XRAY_DIR/"
          cp assets/bin/geoip.dat "$XRAY_DIR/"
          cp assets/bin/geosite.dat "$XRAY_DIR/"
          chmod +x "$XRAY_DIR/xray" "$XRAY_DIR/sing-box"

      - name: Create DMG / ZIP
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/flux-macos.zip" flux.app

      - name: Upload macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: flux-macos.zip

  # ============================================================
  # Create GitHub Release (only on tag push)
  # ============================================================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          # Split APKs per ABI
          cp artifacts/android-apk/app-arm64-v8a-release.apk "release/Flux-android-arm64.apk" || true
          cp artifacts/android-apk/app-armeabi-v7a-release.apk "release/Flux-android-arm32.apk" || true
          cp artifacts/android-apk/app-x86_64-release.apk "release/Flux-android-x64.apk" || true
          cp artifacts/android-aab/app-release.aab "release/Flux-android.aab"
          cp artifacts/windows-installer/*.exe "release/Flux-windows-setup.exe" || true
          cd artifacts/windows-portable && zip -r "../../release/Flux-windows-portable.zip" . && cd ../..
          cp artifacts/linux-x64/flux-linux-x64.tar.gz "release/Flux-linux-x64.tar.gz"
          cp artifacts/macos-app/flux-macos.zip "release/Flux-macos.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: true
